{% extends "base.html" %}

{% block title %}课迹 - 智能计划{% endblock %}
{% block page_title %}智能计划{% endblock %}

{% block content %}
<section class="panel action-band">
    <div>
        <h2>周计划视图</h2>
        <p class="muted-text">自动规划与重新规划属于后续阶段，当前不会生成计划。</p>
    </div>
    <div class="button-row">
        <button class="button is-disabled" type="button" disabled>一键生成计划 · 暂未接入</button>
        <button class="button secondary is-disabled" type="button" disabled>一键重新规划 · 暂未接入</button>
    </div>
</section>

<section class="week-layout">
    <article class="panel time-panel">
        <div class="section-heading">
            <h2>每日可用时间</h2>
            <span class="status-tag is-muted">暂未接入</span>
        </div>
        <label for="daily-time">今日可用学习时间</label>
        <input id="daily-time" type="text" value="2.5 小时" disabled>
        <p class="muted-text">时间设置保存功能将在后续阶段接入。</p>
    </article>

    <div class="day-grid">
        {% for day in ["周一", "周二", "周三", "周四", "周五"] %}
            <article class="panel day-card"><h3>{{ day }}</h3><p>计划生成暂未接入。</p></article>
        {% endfor %}
    </div>
</section>
{% endblock %}
