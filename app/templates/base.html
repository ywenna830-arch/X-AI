<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}课迹{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar" aria-label="主导航">
            <a class="brand-lockup" href="{{ url_for('main.index') }}">
                <span class="brand-mark">课</span>
                <span>
                    <strong>课迹</strong>
                    <small>学习任务规划</small>
                </span>
            </a>
            <nav class="main-nav">
                <a href="{{ url_for('main.index') }}" class="{{ 'is-active' if active_page == 'home' else '' }}">今日</a>
                <a href="{{ url_for('main.add_task') }}" class="{{ 'is-active' if active_page in ('add_task', 'ai_confirm') else '' }}">课迹助手</a>
                <a href="{{ url_for('main.task_center') }}" class="{{ 'is-active' if active_page == 'tasks' else '' }}">任务</a>
                <a href="{{ url_for('main.plan') }}" class="{{ 'is-active' if active_page == 'plan' else '' }}">计划</a>
            </nav>
            <p class="sidebar-note">把分散的课程信息整理成可确认、可安排的学习任务。</p>
        </aside>

        <div class="workspace">
            <header class="topbar">
                <div>
                    <h1>{% block page_title %}{% endblock %}</h1>
                </div>
            </header>
            <main>
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div class="flash-list">
                            {% for message in messages %}
                                <p>{{ message }}</p>
                            {% endfor %}
                        </div>
                    {% endif %}
                {% endwith %}
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
