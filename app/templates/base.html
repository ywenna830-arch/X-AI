<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}课迹{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar" aria-label="主导航">
            <a class="brand-lockup" href="{{ url_for('main.index') }}">
                <span class="brand-mark">课</span>
                <span>
                    <strong>课迹</strong>
                    <small>学习任务规划</small>
                </span>
            </a>
            <nav class="main-nav">
                <a href="{{ url_for('main.index') }}" class="{{ 'is-active' if active_page == 'home' else '' }}">首页</a>
                <a href="{{ url_for('main.add_task') }}" class="{{ 'is-active' if active_page == 'add_task' else '' }}">添加任务</a>
                <a href="{{ url_for('main.ai_confirm') }}" class="{{ 'is-active' if active_page == 'ai_confirm' else '' }}">AI识别确认</a>
                <a href="{{ url_for('main.task_center') }}" class="{{ 'is-active' if active_page == 'tasks' else '' }}">任务中心</a>
                <a href="{{ url_for('main.plan') }}" class="{{ 'is-active' if active_page == 'plan' else '' }}">智能计划</a>
            </nav>
            <p class="sidebar-note">阶段1界面骨架。保存、识别和规划功能暂未接入。</p>
        </aside>

        <div class="workspace">
            <header class="topbar">
                <div>
                    <p class="eyebrow">阶段1</p>
                    <h1>{% block page_title %}{% endblock %}</h1>
                </div>
                <span class="status-tag is-muted">暂未接入真实数据</span>
            </header>
            <main>
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
